name: YouTube Shorts Robot 24/7

on:
  schedule:
    # 🎯 TARGET: 11:11 AM IST
    # Cron triggers at 10:55 AM IST (5:25 AM UTC) to beat cloud server delays
    - cron: '25 5 * * *'
    
    # 🎯 TARGET: 8:20 PM IST (20:20)
    # Cron triggers at 8:05 PM IST (14:35 UTC) to beat cloud server delays
    - cron: '35 14 * * *'
    
  workflow_dispatch:
  
# The rest of your file (env:, jobs:, etc.) stays exactly the same!
# ⚡ Opt-in globally to GitHub's updated Node.js 24 runtime environment
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-robot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client google-genai

    - name: Inject Secure Keys and Execute Robot Cycle
      env:
        RUNNING_IN_CLOUD: "true"
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
      run: python robot.py

    - name: Save Upload Ledger History back to GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Robot"
        git add upload_history.txt
        git commit -m "🤖 Cloud Auto-Update: Synchronized video upload history ledger [skip ci]" || exit 0
        git push origin main