name: YouTube Shorts Robot 24/7

on:
  schedule:
    # ⏰ Automated Drop: Fires exactly at 11:11 AM IST (5:41 AM UTC) daily
    - cron: '41 5 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-robot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client google-genai

    - name: Inject Secure Keys and Execute Robot Cycle
      env:
        RUNNING_IN_CLOUD: "true"
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
      run: python robot.py

    - name: Save Upload Ledger History back to GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Robot"
        git add upload_history.txt
        git commit -m "🤖 Cloud Auto-Update: Synchronized video upload history ledger [skip ci]" || exit 0
        git push origin main